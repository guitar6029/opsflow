<div class="flex flex-col gap-2">
  <button (click)="toggleFormView()">Toggle Form {{ showTaskForm ? 'Showing' : 'Hiding' }}</button>
  @if (showTaskForm) {
    <form [formGroup]="form" (submit)="addTask()">
      <div>
        <label>Title</label>
        <input formControlName="title" />
      </div>
      <div>
        <label>Status</label>
        <select formControlName="status">
          @for (option of availableStatuses; track option) {
            <option [value]="option">{{ option }}</option>
          }
        </select>
      </div>
      <button type="submit">Add task</button>
    </form>
    <!-- <div>
      <form (submit)="addTaskHandler($event); $event.preventDefault()">
        <div>
          <label for="title">Title</label>
          <input type="text" name="title" id="title" required />
        </div>

        <div>
          <label for="title">Status</label>
          <select required>
            @for (option of availableStatuses; track option) {
              <option>{{ option }}</option>
            }
          </select>
        </div>
        <button type="submit">Add task</button>
      </form>
    </div> -->
  }

  @if (tasks$ | async; as tasks) {
    <ul>
      @for (task of tasks; track task.id) {
        <li>{{ task.title }}</li>
      }
    </ul>
  }
</div>
